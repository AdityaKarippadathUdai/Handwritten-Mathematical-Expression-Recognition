version: '3.8'

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - APP_RUNTIME=docker
      - ENVIRONMENT=docker
      - DEBUG=true

  frontend:
    # Build React app with local development settings or mount for live reload
    environment:
      - NODE_ENV=development
